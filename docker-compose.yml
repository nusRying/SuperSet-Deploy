x-superset-image: &superset-image
  image: superset-coolify:${SUPERSET_VERSION:-latest}
  build:
    context: .
    args:
      SUPERSET_VERSION: ${SUPERSET_VERSION:-latest}
      SUPERSET_PIP_PACKAGES: ${SUPERSET_PIP_PACKAGES:-psycopg2-binary redis gevent openpyxl}

x-postgres-image: &postgres-image
  image: superset-postgres:${POSTGRES_VERSION:-16-alpine}
  build:
    context: .
    dockerfile: docker/postgres/Dockerfile
    args:
      POSTGRES_VERSION: ${POSTGRES_VERSION:-16-alpine}

x-superset-env: &superset-env
  SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:?Set SUPERSET_SECRET_KEY in Coolify. Generate it with openssl rand -base64 42.}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in Coolify.}
  ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Superset}
  ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-Admin}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
  POSTGRES_DB: ${POSTGRES_DB:-superset}
  POSTGRES_USER: ${POSTGRES_USER:-superset}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify.}
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  ENABLE_PROXY_FIX: ${ENABLE_PROXY_FIX:-true}
  PREFERRED_URL_SCHEME: ${PREFERRED_URL_SCHEME:-https}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
  SUPERSET_LOAD_EXAMPLES: ${SUPERSET_LOAD_EXAMPLES:-no}
  SUPERSET_WEBSERVER_WORKERS: ${SUPERSET_WEBSERVER_WORKERS:-2}
  SUPERSET_WEBSERVER_WORKER_CLASS: ${SUPERSET_WEBSERVER_WORKER_CLASS:-gevent}
  SUPERSET_WEBSERVER_THREADS: ${SUPERSET_WEBSERVER_THREADS:-20}
  SUPERSET_WEBSERVER_TIMEOUT: ${SUPERSET_WEBSERVER_TIMEOUT:-120}

services:
  db:
    <<: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-superset}
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify.}
      POSTGRES_SYNC_PASSWORD: ${POSTGRES_SYNC_PASSWORD:-true}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -c 'select 1' >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset:
    <<: *superset-image
    restart: unless-stopped
    environment:
      <<: *superset-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/docker/run-server.sh
    expose:
      - "8088"
    volumes:
      - superset_home:/app/superset_home

  superset-worker:
    <<: *superset-image
    restart: unless-stopped
    environment:
      <<: *superset-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/docker/run-worker.sh
    volumes:
      - superset_home:/app/superset_home

  superset-worker-beat:
    <<: *superset-image
    restart: unless-stopped
    environment:
      <<: *superset-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/docker/run-worker-beat.sh
    volumes:
      - superset_home:/app/superset_home

volumes:
  postgres_data:
  redis_data:
  superset_home:
