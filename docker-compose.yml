x-superset-image: &superset-image
  image: superset-coolify:latest
  build:
    context: .
    args:
      SUPERSET_PIP_PACKAGES: ${SUPERSET_PIP_PACKAGES:-psycopg2-binary redis gevent openpyxl}

x-superset-env: &superset-env
  SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-be2206fbc1e26b61c76281d6486170eb4939610393ee38253cc626ffe1c7fa660798129ef4703c9447f73d153b4ea343}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Kutraa1213}
  ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Superset}
  ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-Admin}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
  POSTGRES_DB: ${POSTGRES_DB:-superset}
  POSTGRES_USER: ${POSTGRES_USER:-superset}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-c18f29fab54bca03c6336522cb632970c86dcf531aef7ce19862e26837f777d111e48db4dcdede0015e5f73c5786edd8}
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  ENABLE_PROXY_FIX: ${ENABLE_PROXY_FIX:-true}
  PREFERRED_URL_SCHEME: ${PREFERRED_URL_SCHEME:-https}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
  SUPERSET_LOAD_EXAMPLES: ${SUPERSET_LOAD_EXAMPLES:-no}
  SUPERSET_RESET_ADMIN_PASSWORD: ${SUPERSET_RESET_ADMIN_PASSWORD:-true}
  SUPERSET_WEBSERVER_WORKERS: ${SUPERSET_WEBSERVER_WORKERS:-2}
  SUPERSET_WEBSERVER_WORKER_CLASS: ${SUPERSET_WEBSERVER_WORKER_CLASS:-gevent}
  SUPERSET_WEBSERVER_THREADS: ${SUPERSET_WEBSERVER_THREADS:-20}
  SUPERSET_WEBSERVER_TIMEOUT: ${SUPERSET_WEBSERVER_TIMEOUT:-120}

services:
  db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-superset}
      POSTGRES_USER: ${POSTGRES_USER:-superset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-c18f29fab54bca03c6336522cb632970c86dcf531aef7ce19862e26837f777d111e48db4dcdede0015e5f73c5786edd8}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset:
    <<: *superset-image
    restart: unless-stopped
    environment:
      <<: *superset-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/docker/run-server.sh
    expose:
      - "8088"
    volumes:
      - superset_home:/app/superset_home

  superset-worker:
    <<: *superset-image
    restart: unless-stopped
    environment:
      <<: *superset-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/docker/run-worker.sh
    volumes:
      - superset_home:/app/superset_home

  superset-worker-beat:
    <<: *superset-image
    restart: unless-stopped
    environment:
      <<: *superset-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/docker/run-worker-beat.sh
    volumes:
      - superset_home:/app/superset_home

volumes:
  postgres_data:
  redis_data:
  superset_home:
